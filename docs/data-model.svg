<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 600"
     role="img"
     aria-labelledby="title desc">
  <title id="title">Data model: six tables and their foreign-key relationships</title>
  <desc id="desc">Six labelled boxes for artist, show, song, learning, rel_show_song, and play_history, connected by arrows that point from the referencing table to the referenced table.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <style>
      .box { fill: #f5f7fa; stroke: #3b4a5a; stroke-width: 2; }
      .label { font-family: sans-serif; font-size: 20px; fill: #1a1a1a; text-anchor: middle; }
      .edge { stroke: #444; stroke-width: 2; fill: none; }
      .caption { font-family: sans-serif; font-size: 16px; fill: #333; text-anchor: middle; }
    </style>
  </defs>

  <!-- Caption -->
  <text x="450" y="36" class="caption">Foreign-key arrows point from referencing to referenced</text>

  <!-- Row 1: artist (top-left), show (top-right) -->
  <rect class="box" x="100" y="80" width="180" height="70" rx="8"/>
  <text x="190" y="123" class="label">artist</text>
  <title>artist — stores one row per singer/band</title>

  <rect class="box" x="620" y="80" width="180" height="70" rx="8"/>
  <text x="710" y="123" class="label">show</text>
  <title>show — stores one row per anime series, distinguished by name + vintage</title>

  <!-- Row 2: song (centre) -->
  <rect class="box" x="360" y="260" width="180" height="70" rx="8"/>
  <text x="450" y="303" class="label">song</text>
  <title>song — one row per song, belongs to one artist</title>

  <!-- Row 3: learning, rel_show_song, play_history -->
  <rect class="box" x="60" y="460" width="200" height="70" rx="8"/>
  <text x="160" y="503" class="label">learning</text>
  <title>learning — tracks review progress per song</title>

  <rect class="box" x="350" y="460" width="200" height="70" rx="8"/>
  <text x="450" y="503" class="label">rel_show_song</text>
  <title>rel_show_song — many-to-many link between shows and songs</title>

  <rect class="box" x="640" y="460" width="200" height="70" rx="8"/>
  <text x="740" y="503" class="label">play_history</text>
  <title>play_history — one row per song/show play event</title>

  <!-- Arrows: referencing -> referenced -->

  <!-- song.artist_id -> artist.id -->
  <path class="edge" d="M 410 260 Q 300 210 220 150" marker-end="url(#arrow)"/>
  <text x="295" y="200" class="caption">song.artist_id</text>

  <!-- rel_show_song.song_id -> song.id -->
  <path class="edge" d="M 430 460 Q 430 400 430 330" marker-end="url(#arrow)"/>
  <text x="370" y="400" class="caption">rel_show_song.song_id</text>

  <!-- rel_show_song.show_id -> show.id -->
  <path class="edge" d="M 530 460 Q 650 300 700 150" marker-end="url(#arrow)"/>
  <text x="640" y="310" class="caption">rel_show_song.show_id</text>

  <!-- play_history.song_id -> song.id -->
  <path class="edge" d="M 680 460 Q 580 390 510 330" marker-end="url(#arrow)"/>
  <text x="660" y="420" class="caption">play_history.song_id</text>

  <!-- play_history.show_id -> show.id -->
  <path class="edge" d="M 780 460 Q 790 300 740 150" marker-end="url(#arrow)"/>
  <text x="810" y="310" class="caption">play_history.show_id</text>

  <!-- learning.song_id -> song.id -->
  <path class="edge" d="M 220 460 Q 320 390 390 330" marker-end="url(#arrow)"/>
  <text x="240" y="420" class="caption">learning.song_id</text>
</svg>
