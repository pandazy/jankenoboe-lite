<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1000 360"
     role="img"
     aria-labelledby="title desc">
  <title id="title">AMQ import pipeline: three scripts in order</title>
  <desc id="desc">A left-to-right flow showing import_plan.py produces plan.json, import_resolve.py consumes plan.json plus an optional answers.json and produces triples.json, and add_play_history.py writes to db/datasource.db.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <style>
      .script { fill: #d6e4f2; stroke: #3b4a5a; stroke-width: 2; }
      .artifact { fill: #fff5cc; stroke: #8a7a2a; stroke-width: 2; }
      .sideinput { fill: #ffe6cc; stroke: #a35a1a; stroke-width: 2; }
      .db { fill: #d9f0d6; stroke: #2d5a2a; stroke-width: 2; }
      .label { font-family: sans-serif; font-size: 16px; fill: #1a1a1a; text-anchor: middle; font-weight: 600; }
      .sublabel { font-family: sans-serif; font-size: 13px; fill: #1a1a1a; text-anchor: middle; }
      .edge { stroke: #444; stroke-width: 2; fill: none; }
      .note { font-family: sans-serif; font-size: 12px; fill: #3b4a5a; text-anchor: middle; font-style: italic; }
      .title-caption { font-family: sans-serif; font-size: 18px; fill: #1a1a1a; text-anchor: middle; font-weight: 600; }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="28" class="title-caption">AMQ import pipeline</text>

  <!-- Step 1: import_plan.py -->
  <rect class="script" x="30" y="130" width="180" height="70" rx="8"/>
  <text x="120" y="168" class="label">import_plan.py</text>
  <text x="120" y="188" class="sublabel">step 1</text>

  <!-- plan.json artifact -->
  <rect class="artifact" x="240" y="140" width="120" height="50" rx="6"/>
  <text x="300" y="170" class="sublabel">plan.json</text>

  <!-- Step 2: import_resolve.py -->
  <rect class="script" x="390" y="130" width="200" height="70" rx="8"/>
  <text x="490" y="168" class="label">import_resolve.py</text>
  <text x="490" y="188" class="sublabel">step 2</text>

  <!-- Note under step 2 -->
  <text x="490" y="224" class="note">creates missing artists / songs / shows; reuses existing rows</text>

  <!-- answers.json side input (above step 2) -->
  <rect class="sideinput" x="410" y="40" width="160" height="50" rx="6"/>
  <text x="490" y="70" class="sublabel">answers.json</text>
  <text x="490" y="110" class="note">only required when the plan has ambiguous entries</text>

  <!-- triples.json artifact -->
  <rect class="artifact" x="620" y="140" width="120" height="50" rx="6"/>
  <text x="680" y="170" class="sublabel">triples.json</text>

  <!-- Step 3: add_play_history.py -->
  <rect class="script" x="770" y="130" width="200" height="70" rx="8"/>
  <text x="870" y="168" class="label">add_play_history.py</text>
  <text x="870" y="188" class="sublabel">step 3</text>

  <!-- Terminal DB cylinder (simplified as rect with curved top) -->
  <rect class="db" x="410" y="270" width="180" height="60" rx="30"/>
  <text x="500" y="296" class="sublabel">db/datasource.db</text>
  <text x="500" y="316" class="note">play_history + rel_show_song</text>

  <!-- Arrows -->
  <!-- (1) step 1 -> plan.json -->
  <line class="edge" x1="210" y1="165" x2="238" y2="165" marker-end="url(#arrow)"/>

  <!-- (2) plan.json -> step 2 -->
  <line class="edge" x1="360" y1="165" x2="388" y2="165" marker-end="url(#arrow)"/>

  <!-- (3) answers.json -> step 2 (downward) -->
  <line class="edge" x1="490" y1="90" x2="490" y2="128" marker-end="url(#arrow)"/>

  <!-- (4) step 2 -> triples.json -->
  <line class="edge" x1="590" y1="165" x2="618" y2="165" marker-end="url(#arrow)"/>

  <!-- (5) triples.json -> step 3 -->
  <line class="edge" x1="740" y1="165" x2="768" y2="165" marker-end="url(#arrow)"/>

  <!-- (6) step 3 -> DB (down + left) -->
  <path class="edge" d="M 870 200 Q 870 270 590 300" marker-end="url(#arrow)"/>
</svg>
